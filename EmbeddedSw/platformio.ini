; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Main application environment - autonomous truck control loop
[env:control_loop]
platform = espressif32@3.5.0
board = esp32dev
framework = arduino
build_flags = 
build_src_filter = -<*.cpp> +<z_main_control_loop.cpp> +<secrets.cpp> +<config.cpp> +<telemetry/mqtt.cpp> +<variables/setget.cpp> +<sensors/compass.cpp> +<sensors/usensor.cpp> +<sensors/accsensor.cpp> +<sensors/kalman_filter.cpp> +<actuators/motor.cpp> +<actuators/steer.cpp>
monitor_speed = 115200
lib_deps = 
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	adafruit/Adafruit HMC5883 Unified@^1.2.3
	adafruit/Adafruit MPU6050@^2.0.4

; Minimal test environment for debugging basic ESP32 functionality
[env:minimal_test]
platform = espressif32@3.5.0
board = esp32dev
framework = arduino
build_src_filter = -<*.cpp> +<z_main_minimal_test.cpp>
monitor_speed = 115200

; WiFi test environment for debugging network connectivity
[env:wifi_test]
platform = espressif32@3.5.0
board = esp32dev
framework = arduino
build_src_filter = -<*.cpp> +<z_main_wifi_test.cpp> +<secrets.cpp>
monitor_speed = 115200
lib_deps = 
	WiFi

; Calibration and setup environment - for initial truck setup and compass calibration
[env:calibration]
platform = espressif32@3.5.0
board = esp32dev
framework = arduino
build_flags = 
build_src_filter = -<*.cpp> +<z_calibration_setup.cpp> +<secrets.cpp> +<config.cpp> +<telemetry/mqtt.cpp> +<variables/setget.cpp> +<sensors/compass.cpp> +<sensors/usensor.cpp> +<sensors/accsensor.cpp> +<sensors/kalman_filter.cpp> +<actuators/motor.cpp> +<actuators/steer.cpp>
monitor_speed = 115200
lib_deps = 
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	adafruit/Adafruit HMC5883 Unified@^1.2.3
	adafruit/Adafruit MPU6050@^2.0.4